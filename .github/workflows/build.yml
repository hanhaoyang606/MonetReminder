name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: [ -f gradlew ] && chmod +x gradlew || echo "gradlew not found"

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          echo "No gradlew found. Attempting to build with system gradle..."
          gradle assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MonetReminder-debug
        path: app/build/outputs/apk/debug/*.apk
